body:
  text: 郴江百詠别集類三宋提要臣等謹案郴江百詠一巻宋阮閲撰閲字閎休舒城人建炎初官至知袁州所撰有詩話總龜别著錄又有松菊集今佚不傳此郴江百詠則其宣和中知郴州時作其詩多入論宗葢宋代風氣如是而閲素留心吟詠多識遺篇故尚不落為酸腐之語如東山詩云藜杖芒鞵過水東紅裙寂寞酒樽空郡人見我應相笑不似山公與謝公又乾明寺詩云直松曲棘都休道庭下山茶為甚紅往往自有思致又如愈泉一首所謂古來詩病知多少試問從來療得無語雖著相然自為其詩話一編而作是亦詩中有人異乎馬首之絡者矣此本出自厲鶚家百詠尚缺其八考郴州志亦不載呉之振選宋詩鈔及曹庭棟選宋詩存均未及收存之亦可補各家選本之遺惟每題之下不註本事非對圖經而讀之有茫不知為何語者或傳寫佚之歟袁州府志載其宣風道上詩一首題春波亭詩一首鮑氏知不足齋本錄于此集之末以補松菊集之遺今亦從鮑本並錄存之焉乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀郴江百詠原序郴古桂陽郡陳迹故事盡載圖史亦間見于名人才士歌詠如杜子羙寄聶令入郴州韓退之郴江桞子厚登北樓沈佺期望仙山戴叔倫過郴州之類是也山川寺觀之勝城郭臺榭之壯未經品題者尚多亦可惜爾余官于郴三年常欲補其闕愧無大筆雅思可為然因暇日時強作一二小詩遂積至於百篇雖不敢比迹前軰使未嘗到湖湘者觀之亦可知郴在荆楚自是一佳郡也宣和甲辰二月中和日舒城阮閱序
