  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0186_WYG_001-1a, image: WYG1136/WYG1136-0111a.png}
body:
  text: 郴江百詠宋阮閲撰東樓危城雉堞對東山誰創高樓十二欄獨鶴不來松已老春風動處日三竿上仙閣曲檻危梯紫翠中蘇仙宅畔古城東不須更著登山屐萬岫千峯一日窮俯春亭城上危亭可摘雲四邉山色翠為鄰下窺城郭無餘蘊草色花光盡是春山隂堂修竹蒼蒼似剡川浮觴可繼永和年不知誰有羲之筆欲寫蘭亭第二篇藏春亭百紫千紅一徑深胭脂為地粉為林有人來問春何在向道花間無處尋靈壽庵結茅編竹對高叢不種修篁不植松但得數枝花似雪何須裁截伴枯笻清淑堂三仙一相有遺風清淑誰言到此窮寄與郴陽忠信士得名端合謝韓公篔簹亭娟娟細細兩三叢却厭桃花相近紅已有數枝湘浦月不消千畝渭川風三懷堂東京吏治孰稱循范曄才書十二人前日桂陽三太守許誰來此繼芳塵射圃亭不似投壺謾雅歌縱賢無奈罰觥何若知蓬矢桑弧意不用穿楊中鵠多紫芝亭和氣薰蒸庶草靈昔年聞有紫芝生史官不絶書祥瑞幾欲圗形獻此名擷芳園萬萼千枝二月春只愁風雨便成塵不知誰擷香英去自有尋芳拾翠人砌臺翠珉斜倚若危梯上出高城下枕池不但綺羅為戲事又將臺使補廬兒西樓危樓百尺對東山簾幕秋風捲暮寒每向殘陽新月看幾人曾此憑欄干真仙亭雕甍畫棟對羣山逺目增明盡日看無奈人心多險偽須求拳石作峯巒碧虛亭笻竹枝彎屐齒搖登臨身覺在煙霄千峯險似三川峽一水深如八月潮北湖亭簷楹山影水光中攜酒來時伴釣翁四岸煙雲芳草緑一欄風雨落花紅緑淨堂緑如青草淨如淵逺近山光上下天有客憑欄若相問為言此處似蒸川湖亭城外高堂俯碧灣山如螺黛水如環有時鼓棹來尋勝直到斜陽未欲還北園一塢春風北苑芽滿川流水武陵花溪東舊觀仙人宅城內高樓刺史家輝松臺靈壽峯前路有苔松門依舊對山開幽人野叟尋僧至時有輝輝大斾來燕堂山有香爐水有瓶齋無塵榻閣無鈴胡牀塵拂枯藜杖門對江山日夜扃竹軒軒户蕭條對北垣誰來此地種檀欒無人會得青青意雨洗風吹葉葉寒白蓮亭石甃方池種白蓮庵僧欲紹逺公禪文皮麈尾來遊處誰似廬山十八賢南樓雉堞譙樓紫翠環紅塵擾擾白雲間蠻煙瘴雨千峰外邑屋人家十里間東園芳春閣外茂林中池上新橋路徑通誰種松篁藏古意我栽桃李引春風蘇仙觀寂寂星壇長緑苔井邉橘老又重栽城頭依舊東樓在未見當時鶴再來成仙觀仙去寥寥幾百春隱居依舊在湖瀕枝頭禽語人難會石上騾蹤事已陳露仙觀寂寞荒壇枕水邉長沙施藥已千年松間風露如前日何事無人更得仙騾穴觀朝辭湘楚暮山東今在蓬萊第幾峰可笑時人空擾擾武昌山下問騾蹤景星觀聖世休祥見景星曾聞瑞日慶雲生羽人中夜來朝斗透過松梢一點明東山藜杖芒鞋過水東紅裙寂寞酒樽空郡人見我應相笑不似山公與謝公五蓋山五峰如蓋色蒼蒼隔斷蠻陬與瘴鄉才見山中冬有雪郴人預説歲豐穰黃相山東帶連山接五羊西分郴水下三湘路人到此休南去嶺外千峯盡瘴鄉百丈山縈迂鳥道少人通只有豺狼夜過蹤自衒崚嶒踰百丈安知七十二高峯孤山瘴山蠻嶺鬬嵯峩高可躋登不可磨萬岫千巖皆闒茸一峯孤秀不如多雕玉山培嶁﨑嶇面碧霄何曾溫潤似瓊瑶一堆頑石郴江上縱有崑刀不可雕桄榔山休言鳥道與羊腸鳥道羊腸不可方却喜年年種牟麥山中不用有桄榔馬嶺牛山日日夕陽紅鹿洞年年草色濃更有當時馬行處郴人猶指舊騾蹤話石人世嘵嘵已不根更堪頑石亦紛紛何如緘口藏長舌道路如今已厭聞白鹿巖風馭雲軒鶴羽輕野麋常此望霓旌當時巖下藏身處依舊春來草自生坦山巖空山夜雨鬼神愁怪石層崖虎豹憂鳥道不通車馬到只供衲子羽人遊兜率巖泉如鉛汞流丹竈石似珊瑚出海濤不會當時融結意區區雖巧亦何勞王履巖勾踐因何渡楚川蒼蒼雙石臥寒煙當時縱使為淫巧片石安能作履穿郴江口扁舟斗轉急如飛對此令人憶退之不但郴江有佳句義魚禱雨盡留詩靈湫老蛟力鬬死池中山下流泉暗谷通風雨年年常十五休將涓滴強邀功中洲捲地江流繞古城參天喬木一洲橫年年秋雨無情甚沙觜才高又壓平崇德河楚俗聲音誤最多近來方證桂門訛分明流向郴人道此水今名崇德河怨溪濺濺溪水石磷磷兩岸山花野草春流去前灘何處問不知當日怨何人千秋水不求至道不修真一穴涓涓豈有神王錫蘇耽已仙去未應皆是酌泉人潮井朔月盈虧已可疑隨泉上下更難知錢塘江在吳山外誰見來時與落時浪井可畏人情與世途險如波浪起江湖豈知荆楚山川地坎井泓泉無處無橘井蘇仙舊隱已藤蘿橘井空來歲月多摘葉汲泉皆朽骨郡人猶説愈沉痾愈泉未載人間肘後書此名直恐是相誣古人詩病知多少試問從來療得無圓泉清洌淵淵一竇圓每來嘗為試茶煎又新水鑒全然誤第作人間十八泉溫泉誰將炎熱換清涼可使澄泓作沸揚從賜驪山妃子沐人間處處重溫湯香泉僧舍靈源靜不流只供齋鉢與茶甌直應老衲投薰陸石罅雲根久未收醽醁泉玉為麯糵石為壚萬榼千壺汲未枯山下家家有醇酒釀時皆用此泉無蒙泉流出山根無盡時潛深不似瀑泉飛此時非淨還非垢欲洗須知是鈍機劍泉太阿氣在斗牛邉報惠論讐世有仙黥賊東來攜敗鐡地靈安肯為生泉貪泉玉潔氷寒徹底清不因汲引有虧盈亷泉讓水貪無異空使時人惡此名寒泉春欲為霜夏欲氷一山寒氣逼人清應知炎冷難同處甘與湯泉各自生郴江不分涓滴溉田疇只有重灘礙巨舟險似瞿塘并贑水豈能如鑑㵼清流靈壽木聊依枯木伴寒藤曽為當年孔傅生寂寞空山窮谷裏如今文杏又爭名茶山寺莽草寒蘆事不經八峯深在亂雲層只因一句鵝湖讖直至於今有此稱會勝寺靈壽山前古梵宫粥魚齋鼓白雲中衲僧若會蒙泉意竟與曹溪一徑通香山寺十里城南古道場一泓寒水翠微傍幽人衲子時來汲疑是山中草木香崇毅寺城外招提竹隱門更無一點利名塵蒲團紙帳松忩下却有安禪藏卷人乾明寺寺古僧殘丈室空我來試問老禪翁直松曲棘都休道庭下山茶為甚紅開福寺郴江東畔小禪林誰見當年地布金夜磬一敲僧定出水聲東去月西沉開利寺修篁喬木水西涯古屋頽垣逹磨家持鉢但聞僧乞供杜門不為客烹茶東山寺竹外長橋過水西林中鐘磬舊禪扉笻迎殘月僧包去帆背斜陽客艇歸太平寺石虎城西郴水邉支提突兀祖燈傳有人認得雙巖桂何必庭前柏子禪南塔寺江岸南峰對石城僧房高在亂雲層臺前天闊秋多月塔上風微夜有燈妙勝寺誰營僧舍近西城今與行人作短亭庭下秋風花􅉡􅉡門前春水竹青青永慶寺空庭生草路生苔寂寂荆扉小徑開有客試泉方到此須知不是為僧來尊勝寺老僧不復識叢林只説幽棲是息心可惜一溪東去水更無軒石稱登臨白虎城楚人未築上遊城千古寃聲尚未平雉堞已然無石虎不知何用昔時名石城郴江渺渺接湘天層壁重崖北水邉數日東風春浪惡漁舟不是莫愁船蘇仙祠羽節雲旌事已空舊庵今在最高峯拂壇不見當時竹繫馬猶存舊日松孝婦塜國史班班有舊聞欲將重説與郴人教知蔡婦澘然意可比神仙潠酒神久留岡潁人間欲問郴人衛颯如何似寇恂只恐當時遮道者不應皆是惜留人劉相國書堂踈林翠竹水滄滄問是劉公舊隱堂但得青編有完傳故居寂寞亦何傷窊樽山中聞有酒官泉復有窊樽在水邉荆楚人皆喜羣飲見時應有口流涎迷橋林花岸桞草芊芊山下長橋跨碧川往事茫茫無問處不知迷俗是迷仙桂門關惡名辨正可無疑已有金華學士題寄語往來荆廣客鬼門關在鬱林西漏天從古常聞有漏天此言恐是里人傳山深自合常多雨不是媧皇補未全飛仙橋匱中飛出過遼天樓上歸來又幾年雲物已間松已老芝田依舊在橋邉棲鳯驛鳯出明時欲覽輝棲桐食竹屢來儀空山窮谷無丹穴肯伴鴟梟共一枝龜峯鋪山似龜形古戍西路人到此欲稽疑刳腸鑽灼猶難信頑石何緣解有知蔡倫宅竹簡韋編寫六經不知何用搗枯藤自從杵臼深藏後采楮舂桑事已更西湖岸草江花對夕陽滿船新月夜鳴榔秋清菡萏紅千柄風靜琉璃碧一方附録宣風道上馬蹄西去夕陽催濃淡寒山翠作堆北鴈無情怕秋熱帶將寒信過江來題春波亭數葉荷衣一短藜春波亭上倚斜暉無人會得詩中畫憑盡闌干又獨歸郴江百詠
